name: Build Firmware

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install PlatformIO
        run: pip install platformio
      - name: Build firmware (verbose)
        run: |
          cd firmware
          pio run -v || pio run
      - name: Show build tree
        run: |
          echo "Build tree:"
          ls -R firmware/.pio || true
      - name: Collect artifact (robust)
        run: |
          mkdir -p dist
          # copy firmware.bin from any build subfolder
          shopt -s nullglob 2>/dev/null || true
          for f in firmware/.pio/build/*/firmware.bin; do
            cp "$f" dist/firmware.bin && echo "Copied $f" && break
          done
          # fallback: try the exact path used before
          cp firmware/.pio/build/esp32dev/firmware.bin dist/firmware.bin || true
      - uses: actions/upload-artifact@v4
        with:
          name: firmware-dist
          path: dist/firmware.bin
