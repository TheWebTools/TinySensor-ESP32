name: Build Firmware

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install PlatformIO
        run: pip install platformio
      - name: Build firmware
        run: |
          cd firmware
          pio run -e esp32dev || pio run
      - name: Collect artifact
        run: |
          mkdir -p dist
          cp firmware/.pio/build/esp32dev/firmware.bin dist/firmware.bin || true
      - uses: actions/upload-artifact@v4
        with:
          name: firmware-dist
          path: dist/firmware.bin
